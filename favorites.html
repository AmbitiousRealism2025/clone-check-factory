<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" 
        content="default-src 'self'; 
                 script-src 'self'; 
                 style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; 
                 font-src 'self' https://fonts.gstatic.com; 
                 img-src 'self' data: https://avatars.githubusercontent.com; 
                 connect-src https://api.github.com;">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Your saved favorite GitHub repositories">
  <title>Favorites - GitHub Explorer</title>
  <link rel="stylesheet" href="/src/css/main.css">
</head>
<body>
  <a href="#main-content" class="skip-link">Skip to main content</a>
  <div class="app">
    <div data-app-shell data-page="favorites"></div>

    <main class="main" id="main-content">
      <div class="container">
        <div class="page-header">
          <h1 class="page-title">Your Favorites</h1>
          <p class="page-subtitle">Repositories you've saved for later</p>
        </div>

        <section id="favorites-section" class="hidden">
          <div class="results-info">
            <p class="results-count" id="results-count"></p>
          </div>
          <div class="repo-grid" id="repo-grid"></div>
        </section>

        <section id="empty-state" class="empty-state">
          <svg class="empty-state__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
          </svg>
          <h2 class="empty-state__title">No favorites yet</h2>
          <p class="empty-state__description">Start exploring and save repositories you want to remember.</p>
          <a href="/" class="btn btn--primary mt-md">Explore Repositories</a>
        </section>
      </div>
    </main>

    <footer class="footer">
      <div class="container footer__inner">
        <p>Built with the GitHub API</p>
        <p class="footer__rate-limit" id="rate-limit-display"></p>
      </div>
    </footer>
  </div>

  <script type="module" src="/src/js/favorites.js"></script>
</body>
</html>
