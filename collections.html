<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" 
        content="default-src 'self'; 
                 script-src 'self'; 
                 style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; 
                 font-src 'self' https://fonts.gstatic.com; 
                 img-src 'self' data: https://avatars.githubusercontent.com; 
                 connect-src https://api.github.com;">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Organize your favorite repositories into smart collections">
  <title>Collections - GitHub Explorer</title>
  <link rel="stylesheet" href="/src/css/main.css">
</head>
<body>
  <a href="#main-content" class="skip-link">Skip to main content</a>
  <div class="app">
    <div data-app-shell data-page="collections"></div>

    <main class="main" id="main-content">
      <div class="container">
        <div class="page-header">
          <h1 class="page-title">Smart Collections</h1>
          <p class="page-subtitle">Organize repositories into named collections for research and comparison</p>
        </div>

        <div class="collections-actions mb-lg">
          <button class="btn btn--primary" id="create-collection-btn">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12 5v14M5 12h14"/>
            </svg>
            New Collection
          </button>
        </div>

        <div id="collections-list" class="collections-grid"></div>

        <section id="empty-state" class="empty-state hidden">
          <svg class="empty-state__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/>
          </svg>
          <h2 class="empty-state__title">No collections yet</h2>
          <p class="empty-state__description">Create your first collection to organize repositories by project, technology, or research topic.</p>
        </section>
      </div>
    </main>

    <footer class="footer">
      <div class="container footer__inner">
        <p>Built with the GitHub API</p>
        <p class="footer__rate-limit" id="rate-limit-display"></p>
      </div>
    </footer>

    <div class="modal-overlay" id="collection-modal">
      <div class="modal">
        <div class="modal__header">
          <h2 class="modal__title" id="modal-title">New Collection</h2>
          <button class="modal__close" id="modal-close" aria-label="Close modal">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M18 6L6 18M6 6l12 12"/>
            </svg>
          </button>
        </div>
        <div class="modal__body">
          <div class="form-group">
            <label class="filter-label" for="collection-name">Collection Name</label>
            <input type="text" class="input" id="collection-name" placeholder="e.g., Auth Libraries">
          </div>
          <div class="form-group mt-md">
            <label class="filter-label" for="collection-description">Description (optional)</label>
            <textarea class="input" id="collection-description" rows="3" placeholder="What is this collection for?"></textarea>
          </div>
        </div>
        <div class="modal__footer">
          <button class="btn btn--secondary" id="modal-cancel">Cancel</button>
          <button class="btn btn--primary" id="modal-save">Save Collection</button>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="/src/js/collections.js"></script>
</body>
</html>
