<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" 
        content="default-src 'self'; 
                 script-src 'self'; 
                 style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; 
                 font-src 'self' https://fonts.gstatic.com; 
                 img-src 'self' data: https://avatars.githubusercontent.com; 
                 connect-src https://api.github.com;">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Discover trending GitHub repositories from the past week">
  <title>Trending Repositories - GitHub Explorer</title>
  <link rel="stylesheet" href="/src/css/main.css">
</head>
<body>
  <a href="#main-content" class="skip-link">Skip to main content</a>
  <div class="app">
    <div data-app-shell data-page="trending"></div>

    <main class="main" id="main-content">
      <div class="container">
        <div class="page-header">
          <h1 class="page-title">Trending Repositories</h1>
          <p class="page-subtitle">Most starred repositories created in the past week</p>
        </div>

        <div class="filters-bar mb-lg">
          <div class="filter-group">
            <label class="filter-label" for="category-filter">Category</label>
            <select class="input select" id="category-filter">
              <!-- Populated by JavaScript from TRENDING_CATEGORIES -->
            </select>
          </div>
          <div class="filter-group">
            <label class="filter-label" for="language-filter">Language</label>
            <select class="input select" id="language-filter">
              <option value="">All Languages</option>
              <option value="javascript">JavaScript</option>
              <option value="typescript">TypeScript</option>
              <option value="python">Python</option>
              <option value="java">Java</option>
              <option value="go">Go</option>
              <option value="rust">Rust</option>
              <option value="ruby">Ruby</option>
              <option value="php">PHP</option>
              <option value="c++">C++</option>
              <option value="c#">C#</option>
              <option value="swift">Swift</option>
              <option value="kotlin">Kotlin</option>
            </select>
          </div>
        </div>

        <section id="results-section" class="hidden">
          <div class="results-info">
            <p class="results-count" id="results-count" aria-live="polite"></p>
          </div>
          <div class="repo-grid" id="repo-grid"></div>
          <div class="pagination" id="pagination"></div>
        </section>

        <section id="loading-state">
          <div class="repo-grid">
            <div class="repo-card"><div class="skeleton skeleton--title"></div><div class="skeleton skeleton--text"></div><div class="skeleton skeleton--text" style="width: 80%"></div></div>
            <div class="repo-card"><div class="skeleton skeleton--title"></div><div class="skeleton skeleton--text"></div><div class="skeleton skeleton--text" style="width: 80%"></div></div>
            <div class="repo-card"><div class="skeleton skeleton--title"></div><div class="skeleton skeleton--text"></div><div class="skeleton skeleton--text" style="width: 80%"></div></div>
            <div class="repo-card"><div class="skeleton skeleton--title"></div><div class="skeleton skeleton--text"></div><div class="skeleton skeleton--text" style="width: 80%"></div></div>
            <div class="repo-card"><div class="skeleton skeleton--title"></div><div class="skeleton skeleton--text"></div><div class="skeleton skeleton--text" style="width: 80%"></div></div>
            <div class="repo-card"><div class="skeleton skeleton--title"></div><div class="skeleton skeleton--text"></div><div class="skeleton skeleton--text" style="width: 80%"></div></div>
          </div>
        </section>

        <section id="error-state" class="empty-state hidden">
          <svg class="empty-state__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <circle cx="12" cy="12" r="10"/>
            <path d="M12 8v4M12 16h.01"/>
          </svg>
          <h2 class="empty-state__title">Something went wrong</h2>
          <p class="empty-state__description" id="error-message">Please try again later.</p>
          <button class="btn btn--primary mt-md" id="retry-btn">Try Again</button>
        </section>

        <section id="empty-state" class="empty-state hidden">
          <svg class="empty-state__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <circle cx="11" cy="11" r="8"/>
            <path d="M21 21l-4.35-4.35"/>
          </svg>
          <h2 class="empty-state__title" id="empty-state-title">No results found</h2>
          <p class="empty-state__description">Try broadening your search:</p>
          <div class="empty-state__actions" id="empty-state-actions">
            <!-- Buttons populated by JavaScript -->
          </div>
        </section>
      </div>
    </main>

    <footer class="footer">
      <div class="container footer__inner">
        <p>Built with the GitHub API</p>
        <p class="footer__rate-limit" id="rate-limit-display"></p>
      </div>
    </footer>
  </div>

  <script type="module" src="/src/js/trending.js"></script>
</body>
</html>
