<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self';
                 script-src 'self';
                 style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
                 font-src 'self' https://fonts.gstatic.com;
                 img-src 'self' data: https://avatars.githubusercontent.com;
                 connect-src https://api.github.com;">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Repository Pulse Dashboard - predictive trend analysis and vital signs metrics">
  <title>Repository Pulse - GitHub Explorer</title>
  <link rel="stylesheet" href="/src/css/main.css">
</head>
<body>
  <a href="#main-content" class="skip-link">Skip to main content</a>
  <div class="app">
    <div data-app-shell data-page="pulse"></div>

    <main class="main" id="main-content">
      <div class="container">
        <section id="loading-state">
          <div class="skeleton skeleton--title" style="width: 300px; height: 2rem; margin-bottom: 1rem;"></div>
          <div class="skeleton skeleton--text" style="width: 60%; margin-bottom: 2rem;"></div>
          <div class="pulse-dashboard-skeleton">
            <div class="skeleton" style="height: 200px; margin-bottom: 1.5rem;"></div>
            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 1.5rem;">
              <div class="skeleton" style="height: 180px;"></div>
              <div class="skeleton" style="height: 180px;"></div>
              <div class="skeleton" style="height: 180px;"></div>
              <div class="skeleton" style="height: 180px;"></div>
              <div class="skeleton" style="height: 180px;"></div>
              <div class="skeleton" style="height: 180px;"></div>
            </div>
          </div>
        </section>

        <section id="pulse-content" class="hidden">
          <div class="page-header">
            <div class="flex-between gap-md">
              <div>
                <h1 class="page-title" id="repo-name"></h1>
                <p class="page-subtitle" id="repo-description"></p>
              </div>
              <div class="flex gap-sm">
                <a class="btn btn--secondary" id="view-details-btn" href="#">
                  <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
                  View Details
                </a>
                <a class="btn btn--primary" id="github-link" href="#" target="_blank" rel="noopener noreferrer">
                  <svg viewBox="0 0 16 16" width="16" height="16" fill="currentColor"><path d="M3.75 2h3.5a.75.75 0 0 1 0 1.5h-3.5a.25.25 0 0 0-.25.25v8.5c0 .138.112.25.25.25h8.5a.25.25 0 0 0 .25-.25v-3.5a.75.75 0 0 1 1.5 0v3.5A1.75 1.75 0 0 1 12.25 14h-8.5A1.75 1.75 0 0 1 2 12.25v-8.5C2 2.784 2.784 2 3.75 2Zm6.854-1h4.146a.25.25 0 0 1 .25.25v4.146a.25.25 0 0 1-.427.177L13.03 4.03 9.28 7.78a.751.751 0 0 1-1.042-.018.751.751 0 0 1-.018-1.042l3.75-3.75-1.543-1.543A.25.25 0 0 1 10.604 1Z"/></svg>
                  View on GitHub
                </a>
              </div>
            </div>
          </div>

          <div id="pulse-container"></div>
        </section>

        <section id="error-state" class="empty-state hidden">
          <svg class="empty-state__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <circle cx="12" cy="12" r="10"/>
            <path d="M12 8v4M12 16h.01"/>
          </svg>
          <h2 class="empty-state__title">Repository not found</h2>
          <p class="empty-state__description" id="error-message">The repository you're looking for doesn't exist or is private.</p>
          <a href="/" class="btn btn--primary mt-md">Back to Search</a>
        </section>
      </div>
    </main>

    <footer class="footer">
      <div class="container footer__inner">
        <p>Built with the GitHub API</p>
        <p class="footer__rate-limit" id="rate-limit-display"></p>
      </div>
    </footer>
  </div>

  <script type="module" src="/src/js/pulse.js"></script>
</body>
</html>
